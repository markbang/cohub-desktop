name: release

# 打 tag（v*）时构建并在 GitHub Release 上发布跨平台安装包。
# Draft release，发布前可在 GitHub UI 里编辑 release notes 后点 Publish。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（必须已存在，如 v0.0.1）"
        required: true

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Cohub Desktop ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Cohub 桌面伴侣 v0.0.1。

            ## 安装

            - **macOS**：下载 `.dmg`（Apple Silicon 选 `aarch64`，Intel 选 `x64`）。首次打开若提示无法验证，右键 → 打开。
            - **Windows**：下载 `.msi` 或 `.exe` 安装。
            - **Linux**：下载 `.deb`（Debian/Ubuntu）或 `.AppImage`（通用）。

            ## 功能

            - Device Flow 登录 Cohub
            - 实时活动监听（全部 Space 的对话流式状态、完结可点击通知）
            - 系统托盘（未读红点、关闭即最小化到托盘）
            - 应用设置（仅监听我创建的 Space / 仅监听我的对话 / 通知偏好）
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
